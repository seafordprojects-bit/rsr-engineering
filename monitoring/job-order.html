<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Job Order</title>
<style>
  :root{
    --ink:#1c2230; --muted:#6b7280; --line:#e3e6ec; --paper:#ffffff;
    --bg:#f4f5f7; --steel:#2f5d8a; --steel-d:#234a70; --ok:#1f7a4d; --warn:#b4540a;
    --radius:14px; --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
       font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       padding:0 0 48px;-webkit-text-size-adjust:100%}
  .wrap{max-width:560px;margin:0 auto;padding:14px}
  header.top{display:flex;align-items:baseline;justify-content:space-between;padding:10px 2px 14px}
  header.top h1{font-size:19px;margin:0;letter-spacing:.2px}
  header.top .sub{color:var(--muted);font-size:12.5px}
  a.back{color:var(--steel);text-decoration:none;font-size:13px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
        padding:16px;margin-bottom:14px;box-shadow:0 1px 2px rgba(20,30,50,.04)}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 12px;font-weight:700}
  label{display:block;font-size:12.5px;color:var(--muted);margin:10px 0 4px;font-weight:600}
  input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;
        font-size:15px;background:#fcfcfd;color:var(--ink);font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--steel);border-color:var(--steel)}
  textarea{min-height:64px;resize:vertical}
  .row{display:flex;gap:10px}
  .row>div{flex:1}
  .calc{display:flex;justify-content:space-between;align-items:center;background:#f1f5fa;
        border:1px dashed #c3d3e4;border-radius:10px;padding:10px 12px;margin-top:12px;font-size:13.5px}
  .calc b{font-family:var(--mono);font-size:15px}
  button.primary{width:100%;margin-top:14px;padding:13px;border:0;border-radius:11px;background:var(--steel);
        color:#fff;font-size:15px;font-weight:700;letter-spacing:.2px}
  button.primary:active{background:var(--steel-d)}
  button.primary:disabled{opacity:.5}
  .msg{margin-top:10px;font-size:13px;padding:9px 11px;border-radius:9px;display:none}
  .msg.ok{display:block;background:#e8f5ee;color:var(--ok);border:1px solid #bfe3cf}
  .msg.err{display:block;background:#fbeae1;color:var(--warn);border:1px solid #f0cab0}
  .hint{font-size:12.5px;color:var(--warn);background:#fbf3e8;border:1px solid #f0d9bf;border-radius:9px;padding:9px 11px;margin-top:8px}
  .job{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:var(--paper)}
  .job .no{font-family:var(--mono);font-size:13px;color:var(--steel-d);font-weight:700}
  .job .ttl{font-weight:600;margin:2px 0 6px}
  .job .meta{display:flex;flex-wrap:wrap;gap:4px 14px;font-size:12.5px;color:var(--muted)}
  .job .meta b{color:var(--ink);font-weight:600}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
  .pill.open{background:#eef2f7;color:#3a5573}
  .pill.ongoing{background:#e8f0fb;color:#235}
  .pill.done{background:#e8f5ee;color:var(--ok)}
  .empty{color:var(--muted);font-size:13.5px;text-align:center;padding:18px 0}
  .loading{color:var(--muted);font-size:13px;text-align:center;padding:10px}
</style>
<script type="importmap">
{
  "imports": {
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2",
    "preact": "https://esm.sh/preact@10.19.3",
    "preact/hooks": "https://esm.sh/preact@10.19.3/hooks",
    "htm": "https://esm.sh/htm@3.1.1"
  }
}
</script>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <h1>Job Order</h1>
        <div class="sub">Inspect &rarr; create</div>
      </div>
      <a class="back" href="index.html">&larr; Menu</a>
    </header>
    <div id="app"><div class="loading">Loading&hellip;</div></div>
  </div>

  <script type="module">
    import { h, render } from "preact";
    import { useState, useEffect } from "preact/hooks";
    import htm from "htm";
    import { sb, SITES, loadLocations, todayLocal, ymd, addDays, fmtNum } from "./config.js";
    const html = htm.bind(h);

    function App() {
      const [locations, setLocations] = useState(null);
      const [jobs, setJobs] = useState(null);
      const [preparedBy, setPreparedBy] = useState(localStorage.getItem("rsr_prepared_by") || "");

      const [vessel, setVessel]     = useState("");
      const [site, setSite]         = useState(SITES[0]);
      const [location, setLocation] = useState("");
      const [desc, setDesc]         = useState("");
      const [kilos, setKilos]       = useState("");
      const [start, setStart]       = useState(todayLocal());
      const [days, setDays]         = useState("5");
      const [busy, setBusy]   = useState(false);
      const [msg, setMsg]     = useState(null);

      useEffect(() => { refresh(); }, []);
      async function refresh() {
        const [locs, js] = await Promise.all([loadLocations(), fetchJobs()]);
        setLocations(locs);
        if (locs.length && !location) setLocation(locs[0].location);
        setJobs(js);
      }
      async function fetchJobs() {
        const { data, error } = await sb.from("jobs")
          .select("job_no,vessel,site,location,description,kilos,est_manhours,status,start_date,target_date")
          .order("created_at", { ascending:false }).limit(20);
        if (error) { console.error(error); return []; }
        return data || [];
      }

      const rate = (() => {
        const l = (locations||[]).find(x => x.location === location);
        return l ? Number(l.manhours_per_kg) : 0;
      })();
      const kg = Number(kilos) || 0;
      const est = +(kg * rate).toFixed(2);
      const nDays = Math.max(1, Number(days) || 1);
      const target = ymd(addDays(start, nDays - 1));

      function savePreparedBy(v){ setPreparedBy(v); localStorage.setItem("rsr_prepared_by", v); }

      async function save() {
        setMsg(null);
        if (!vessel.trim())  return setMsg({type:"err",text:"Enter the vessel."});
        if (!location)       return setMsg({type:"err",text:"Pick a location."});
        if (kg <= 0)         return setMsg({type:"err",text:"Enter estimated plates (kg)."});
        if (rate <= 0)       return setMsg({type:"err",text:`No rate set for "${location}". Seed work_standards first.`});
        setBusy(true);
        try {
          const { data: jobNo, error: e1 } = await sb.rpc("next_job_no", { p_site: site });
          if (e1) throw e1;
          const { error: e2 } = await sb.from("jobs").insert({
            job_no: jobNo, vessel: vessel.trim(), site, location,
            description: desc.trim() || null, kilos: kg,
            rate_used: rate, est_manhours: est, status: "open",
            start_date: start, target_date: target,
            created_by: preparedBy.trim() || null,
          });
          if (e2) throw e2;
          setMsg({type:"ok",text:`Created ${jobNo} \u00b7 est ${fmtNum(est)} man-hrs`});
          setVessel(""); setDesc(""); setKilos("");
          setJobs(await fetchJobs());
        } catch (err) {
          console.error(err);
          setMsg({type:"err",text:"Could not save: " + (err.message || err)});
        } finally { setBusy(false); }
      }

      if (locations === null) return html`<div class="loading">Loading&hellip;</div>`;

      return html`
        <div class="card">
          <h2>New job order</h2>
          <label>Vessel</label>
          <input value=${vessel} onInput=${e=>setVessel(e.target.value)} placeholder="e.g. MV Santa Maria" />
          <div class="row">
            <div>
              <label>Site</label>
              <select value=${site} onChange=${e=>setSite(e.target.value)}>
                ${SITES.map(s => html`<option value=${s}>${s}</option>`)}
              </select>
            </div>
            <div>
              <label>Location of works</label>
              <select value=${location} onChange=${e=>setLocation(e.target.value)}>
                ${(locations||[]).map(l => html`<option value=${l.location}>${l.location}</option>`)}
              </select>
            </div>
          </div>
          ${locations.length === 0 && html`<div class="hint">No locations yet. Seed <b>work_standards</b> with locations + kg\u2192man-hr rates first.</div>`}
          <label>Scope / description</label>
          <textarea value=${desc} onInput=${e=>setDesc(e.target.value)} placeholder="What's being renewed / done"></textarea>
          <div class="row">
            <div>
              <label>Estimated plates (kg)</label>
              <input type="number" inputmode="decimal" value=${kilos} onInput=${e=>setKilos(e.target.value)} placeholder="0" />
            </div>
            <div>
              <label>Estimated days</label>
              <input type="number" inputmode="numeric" value=${days} onInput=${e=>setDays(e.target.value)} />
            </div>
          </div>
          <label>Start date</label>
          <input type="date" value=${start} onInput=${e=>setStart(e.target.value)} />
          <div class="calc">
            <span>Rate: <b>${fmtNum(rate,4)}</b> man-hr/kg \u00b7 Target: <b>${target}</b></span>
            <span>Est: <b>${fmtNum(est)}</b> hrs</span>
          </div>
          <label>Prepared by</label>
          <input value=${preparedBy} onInput=${e=>savePreparedBy(e.target.value)} placeholder="your name" />
          <button class="primary" disabled=${busy} onClick=${save}>
            ${busy ? "Saving\u2026" : "Create job order"}
          </button>
          ${msg && html`<div class="msg ${msg.type}">${msg.text}</div>`}
        </div>

        <div class="card">
          <h2>Recent job orders</h2>
          ${jobs === null
            ? html`<div class="loading">Loading&hellip;</div>`
            : jobs.length === 0
              ? html`<div class="empty">No job orders yet. Create your first one above.</div>`
              : jobs.map(j => html`
                  <div class="job">
                    <div style="display:flex;justify-content:space-between;align-items:center">
                      <span class="no">${j.job_no}</span>
                      <span class="pill ${j.status}">${j.status}</span>
                    </div>
                    <div class="ttl">${j.vessel} \u00b7 ${j.location}</div>
                    <div class="meta">
                      <span><b>${fmtNum(j.kilos)}</b> kg</span>
                      <span>est <b>${fmtNum(j.est_manhours)}</b> hrs</span>
                      <span>${j.start_date || "\u2014"} \u2192 ${j.target_date || "\u2014"}</span>
                    </div>
                  </div>`)
          }
        </div>
      `;
    }

    render(html`<${App} />`, document.getElementById("app"));
  </script>
</body>
</html>
