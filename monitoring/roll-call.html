<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Roll-call</title>
<meta name="theme-color" content="#2f5d8a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />

<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='512'%20height='512'%3E%3Crect%20width='512'%20height='512'%20rx='96'%20fill='%232f5d8a'/%3E%3Cpath%20d='M150%20260l70%2070%20150-150'%20fill='none'%20stroke='%23fff'%20stroke-width='36'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E" />
<style>
  :root{
    --ink:#1c2230; --muted:#6b7280; --line:#e3e6ec; --paper:#ffffff;
    --bg:#f4f5f7; --steel:#2f5d8a; --steel-d:#234a70; --ok:#1f7a4d; --okbg:#e8f5ee;
    --warn:#b4540a; --warnbg:#fbf3e8; --hold:#7a5b1f; --holdbg:#fbf6e7;
    --radius:14px; --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
       font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       padding:0 0 48px;-webkit-text-size-adjust:100%}
  .wrap{max-width:600px;margin:0 auto;padding:14px}
  header.top{display:flex;align-items:baseline;justify-content:space-between;padding:10px 2px 12px}
  header.top h1{font-size:19px;margin:0}
  header.top .sub{color:var(--muted);font-size:12.5px}
  /* Yard badge — filled in by SiteGate from ?site=. Hidden while empty so the header
     never shows a bare chip before the yard is known. */
  .sbadge{font-size:12px;font-weight:700;letter-spacing:.3px;vertical-align:middle;background:#e8f0f8;
        color:var(--steel-d);border:1px solid #cfe0ef;border-radius:10px;padding:2px 8px;margin-left:6px}
  .sbadge:empty{display:none}
  a.back{color:var(--steel);text-decoration:none;font-size:13px}

  .bar{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:13px;margin-bottom:14px}
  .bar label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:5px}
  .bar input[type=date]{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fcfcfd;font-family:inherit}
  .cps{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
  .cp{flex:1 0 28%;text-align:center;padding:9px 4px;border:1px solid var(--line);border-radius:10px;
      background:#fcfcfd;font-size:13px;font-weight:600;color:var(--ink);position:relative}
  .cp.on{background:var(--steel);color:#fff;border-color:var(--steel)}
  .cp .ot{display:block;font-size:9px;letter-spacing:.5px;opacity:.8;margin-top:1px}

  .job{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px}
  .job.paused{background:var(--holdbg);border-color:#ecdcae}
  .jhead{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .jno{font-family:var(--mono);font-size:13px;color:var(--steel-d);font-weight:700}
  .jttl{font-weight:600;margin-top:1px;font-size:14px}
  .jmeta{font-size:12px;color:var(--muted);margin-top:2px}
  .count{font-size:12px;color:var(--ok);font-weight:700;white-space:nowrap}
  .ntbadge{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.3px;color:#b4231f;background:#fbe8e7;border:1px solid #f0bdba;border-radius:10px;padding:1px 6px;margin-left:6px;text-transform:uppercase;vertical-align:middle}

  .people{margin-top:11px;display:flex;flex-direction:column;gap:7px}
  .prow{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .pname{font-size:14px}
  .pname .moved{font-size:10px;font-weight:700;color:var(--warn);background:var(--warnbg);
      border:1px solid #f0d9bf;border-radius:10px;padding:1px 6px;margin-left:6px;letter-spacing:.3px}
  .tog{border:1px solid var(--line);background:#fcfcfd;color:var(--muted);font-size:12.5px;font-weight:700;
       padding:7px 12px;border-radius:9px;min-width:104px;text-align:center}
  .tog.present{background:var(--okbg);color:var(--ok);border-color:#bfe3cf}
  .tog.locked{opacity:.55;font-style:italic;font-weight:600}

  .add{margin-top:10px;display:flex;gap:8px;align-items:center}
  .add select{flex:1;padding:9px 10px;border:1px dashed #c3d3e4;border-radius:9px;background:#f7fafd;font-size:13.5px;font-family:inherit;color:var(--ink)}

  .pausebtn{margin-top:11px;border:1px solid #e7ddc2;background:#fbf6e7;color:var(--hold);
       font-size:12.5px;font-weight:700;padding:8px 12px;border-radius:9px;width:100%}
  .resumebtn{margin-top:11px;border:1px solid #bfe3cf;background:var(--okbg);color:var(--ok);
       font-size:13px;font-weight:700;padding:9px 12px;border-radius:9px;width:100%}
  .reasons{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px}
  .reasons .r{border:1px solid #e7ddc2;background:#fff;color:var(--hold);font-size:12px;font-weight:600;padding:6px 10px;border-radius:18px}
  .holdnote{font-size:12.5px;color:var(--hold);margin-top:8px}

  .empty{color:var(--muted);font-size:13.5px;text-align:center;padding:20px 0;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius)}
  .loading{color:var(--muted);font-size:13px;text-align:center;padding:14px}
  .msg{margin:0 0 12px;font-size:13px;padding:9px 11px;border-radius:9px;background:var(--warnbg);color:var(--warn);border:1px solid #f0d9bf}

  .gate{max-width:340px;margin:6vh auto 0;text-align:center;background:var(--paper);border:1px solid var(--line);
        border-radius:var(--radius);padding:26px 22px}
  .gate .gicon{font-size:40px;line-height:1;margin-bottom:8px}
  .gate h2{font-size:18px;margin:6px 0 4px}
  .gate p{color:var(--muted);font-size:13.5px;margin:0 0 14px}
  .gate .gpin{width:100%;padding:14px;font-size:20px;text-align:center;letter-spacing:4px;
        border:1px solid var(--line);border-radius:12px;background:#fcfcfd;font-family:inherit}
  .gate .gerr{color:var(--warn);background:var(--warnbg);border:1px solid #f0d9bf;border-radius:9px;
        padding:8px 10px;font-size:13px;margin-top:11px}
  .gate .gbtn{width:100%;margin-top:14px;padding:14px;font-size:16px;font-weight:700;color:#fff;
        background:var(--steel);border:none;border-radius:12px}
  .gate .gbtn:disabled{opacity:.6}

  /* tool borrowing */
  .borrowbtn{width:100%;margin-bottom:14px;padding:13px;font-size:15px;font-weight:700;color:#fff;
       background:var(--steel);border:none;border-radius:12px}
  .borrowbtn:disabled{opacity:.6}
  .ov{position:fixed;inset:0;background:rgba(20,26,38,.55);z-index:50;display:flex;align-items:flex-start;
      justify-content:center;padding:14px;overflow-y:auto}
  .ovcard{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
      width:100%;max-width:560px;padding:16px;margin-top:14px}
  .ovhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .ovcard label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin:11px 0 5px}
  .ovcard select,.ovcard input[type=text]{width:100%;padding:10px 12px;border:1px solid var(--line);
      border-radius:10px;font-size:15px;background:#fcfcfd;font-family:inherit}
  .ovhead .x{background:none;border:none;color:var(--muted);font-size:15px;font-weight:700}
  .brcart{margin-top:11px;display:flex;flex-direction:column;gap:6px}
  .brrow{display:flex;justify-content:space-between;align-items:center;background:#f7fafd;
      border:1px solid #e2ebf4;border-radius:9px;padding:8px 11px;font-size:14px}
  .brrow .rm{background:none;border:none;color:var(--warn);font-size:12.5px;font-weight:700}
  .brsum{font-size:14px;margin:8px 0;line-height:1.5}
  .brnote{color:var(--muted);font-size:13px;margin:2px 0 12px}
</style>
<script type="importmap">
{
  "imports": {
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2",
    "preact": "https://esm.sh/preact@10.19.3",
    "preact/hooks": "https://esm.sh/preact@10.19.3/hooks",
    "htm": "https://esm.sh/htm@3.1.1"
  }
}
</script>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <h1>Roll-call <span id="site-badge" class="sbadge"></span></h1>
        <div class="sub">Tap who is present each checkpoint &middot; v2026-07-16b</div>
      </div>
      <a class="back" href="index.html">&larr; Menu</a>
    </header>
    <div id="app"><div class="loading">Loading&hellip;</div></div>
  </div>

  <script type="module">
    import { h, render } from "preact";
    import { useState, useEffect } from "preact/hooks";
    import htm from "htm";
    import { sb, CHECKPOINTS, HOURS_PER_CHECKPOINT, loadEmployees, todayLocal, ymd, addDays,
             upsertJobProgress, loadJobProgressFor } from "./config.js";
    const html = htm.bind(h);

    // --- settings helpers (mirror home.js select-then-update-or-insert) ---
    async function getSetting(key){
      const { data } = await sb.from("settings").select("value").eq("key", key).limit(1);
      return data && data.length ? data[0].value : null;
    }
    async function setSetting(key, value){
      const { data } = await sb.from("settings").select("id").eq("key", key).limit(1);
      if (data && data.length) { await sb.from("settings").update({ value }).eq("key", key); }
      else { await sb.from("settings").insert({ key, value }); }
    }
    const DEVKEY = "rsr_rollcall_device";
    function newToken(){
      try { if (crypto && crypto.randomUUID) return crypto.randomUUID(); } catch(_){}
      return String(Date.now()) + "-" + Math.round(Math.random() * 1e9);
    }

    // --- yard (site) helpers -------------------------------------------------
    // The yard list is DATA (settings.attendance_sites — the same list the kiosk reads), never a
    // hardcoded list here. A new yard added to that array works with no code change.
    async function siteList(){
      try {
        const raw = await getSetting("attendance_sites");
        const arr = raw ? JSON.parse(raw) : [];
        const list = Array.isArray(arr) ? arr.map(x => String(x).trim()).filter(Boolean) : [];
        // Cache for the locked field-phone menu (monitoring/index.html), which renders yard tiles
        // instantly from this even offline. Shared key with the kiosk's yard cache.
        try { if (list.length) localStorage.setItem("rsr_sites", JSON.stringify(list)); } catch(_){}
        return list;
      } catch(_) { return []; }
    }
    // Roll-call entries store the yard NAME ("Carmen"); jobs store the CODE ("CAR"); tool borrows
    // store the site's id (UUID). All three come from the shared `sites` table — read only, the
    // inventory system owns it. Its stale "Site A"/"Site B" rows can never match, because we only
    // look up names present in attendance_sites.
    async function siteRowFor(name){
      const { data } = await sb.from("sites").select("id,code,name");
      return (data||[]).find(s => String(s.name).trim().toLowerCase() === String(name).trim().toLowerCase()) || null;
    }

    // --- tool-borrow helpers (REUSE borrow_issuance + next_no; no parallel system) ------------
    // Available tool units at a yard = active units at the site minus anything currently out.
    async function loadAvailTools(siteId){
      if(!siteId) return [];
      const ures = await sb.from("item_units").select("id,unit_code,status,item_id,items(name,item_code,price)").eq("active",true).eq("site_id",siteId);
      const bres = await sb.from("borrow_issuance").select("unit_id").eq("status","out").eq("site_id",siteId);
      const out = new Set((bres.data||[]).map(b=>b.unit_id));
      const map={};
      (ures.data||[]).forEach(u=>{
        if(u.status!=="available" || out.has(u.id)) return;
        const k=u.item_id;
        if(!map[k]) map[k]={itemId:k, name:(u.items&&u.items.name)||"—", price:(u.items&&u.items.price)||0, units:[]};
        map[k].units.push({id:u.id, code:u.unit_code});
      });
      return Object.values(map).sort((a,b)=>a.name.localeCompare(b.name));
    }
    // Who holds a unit that is out, on which slip, since when — so a rejection names a person.
    async function describeUnitHolder(unitId){
      try{
        const { data } = await sb.from("borrow_issuance")
          .select("slip_no,borrowed_at,employees(name)").eq("unit_id",unitId).eq("status","out").limit(1);
        const r=(data||[])[0]; if(!r) return null;
        return { name:(r.employees&&r.employees.name)||"someone", slip_no:r.slip_no,
                 since:r.borrowed_at?String(r.borrowed_at).slice(0,10):"" };
      }catch(_){ return null; }
    }

    // --- yard gate: ?site= decides the yard. REFUSE rather than guess ---------
    // Outermost on purpose: a missing/unknown yard is a URL problem, so there is no point making
    // the in-charge type the passcode first only to be turned away. Defaulting to a yard is never
    // an option — a wrong-yard entry is silently wrong data, which is worse than a blocked screen.
    function SiteGate(){
      const [phase,setPhase] = useState("checking");   // checking|noyards|nosite|badsite|ok
      const [yards,setYards] = useState([]);
      const [asked,setAsked] = useState("");
      const [site,setSite]   = useState("");
      const [code,setCode]   = useState(null);
      const [siteId,setSiteId] = useState(null);

      useEffect(() => { (async () => {
        const list = await siteList();
        setYards(list);
        const want = (new URLSearchParams(location.search).get("site") || "").trim();
        setAsked(want);
        if (!list.length) { setPhase("noyards"); return; }
        if (!want) { setPhase("nosite"); return; }
        // Match case-insensitively but keep the list's canonical spelling: a hand-typed shortcut
        // shouldn't fail on case, and it still has to be a yard we actually know.
        const hit = list.find(n => n.toLowerCase() === want.toLowerCase());
        if (!hit) { setPhase("badsite"); return; }
        setSite(hit);
        const row = await siteRowFor(hit);
        setCode(row ? row.code : null);
        setSiteId(row ? row.id : null);
        setPhase("ok");
      })(); }, []);

      // The badge lives in the static header, outside the app root.
      useEffect(() => {
        const el = document.getElementById("site-badge");
        if (el) el.textContent = (phase === "ok") ? site : "";
      }, [phase, site]);

      if (phase === "checking") return html`<div class="loading">Checking site&hellip;</div>`;
      if (phase === "ok") return html`<${Gate} site=${site} siteCode=${code} siteId=${siteId} />`;
      if (phase === "noyards") return html`
        <div class="gate">
          <div class="gicon">\u{1F3D7}</div>
          <h2>Wala pa na-set ang yard</h2>
          <p>Palihug adto sa Admin aron ma-set ang listahan sa yard, unya i-reload ni nga page.</p>
        </div>`;
      if (phase === "badsite") return html`
        <div class="gate">
          <div class="gicon">\u{2753}</div>
          <h2>Wala mailhi nga site: ${asked}</h2>
          <p>Ablihi ni gikan sa shortcut sa home screen: ${yards.join(" o ")}.</p>
        </div>`;
      return html`
        <div class="gate">
          <div class="gicon">\u{1F4CD}</div>
          <h2>Asa nga yard?</h2>
          <p>Ablihi ni nga page gikan sa shortcut sa home screen: ${yards.join(" o ")}.</p>
        </div>`;
    }

    // --- passcode + one-device gate that wraps the roll-call app ---
    function Gate({ site, siteCode, siteId }){
      const [phase, setPhase] = useState("checking"); // checking|blocked|nopin|need|ok
      const [pin, setPin] = useState("");
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);

      useEffect(() => { (async () => {
        try {
          const localTok = localStorage.getItem(DEVKEY);
          const [regId, cfgPin] = await Promise.all([
            getSetting("roll_call_device_id"), getSetting("roll_call_pin"),
          ]);
          if (regId && localTok !== regId) { setPhase("blocked"); return; }
          if (!cfgPin) { setPhase("nopin"); return; }
          setPhase("need");
        } catch (e) {
          setErr("Could not reach the server. Check the connection and reload.");
          setPhase("need");
        }
      })(); }, []);

      async function submit(e){
        if (e && e.preventDefault) e.preventDefault();
        if (busy) return;
        setErr("");
        const entry = pin.trim();
        if (!entry) { setErr("Enter the passcode."); return; }
        setBusy(true);
        try {
          const cfgPin = await getSetting("roll_call_pin");
          if (!cfgPin) { setBusy(false); setPhase("nopin"); return; }
          if (entry !== String(cfgPin)) { setBusy(false); setErr("Wrong passcode."); setPin(""); return; }
          // passcode correct — enforce / claim the one-device lock
          const regId = await getSetting("roll_call_device_id");
          let localTok = localStorage.getItem(DEVKEY);
          if (regId && localTok !== regId) { setBusy(false); setPhase("blocked"); return; }
          if (!regId) {
            const tok = localTok || newToken();
            localStorage.setItem(DEVKEY, tok);
            await setSetting("roll_call_device_id", tok);
          }
          setBusy(false); setPhase("ok");
        } catch (err) {
          setBusy(false); setErr("Could not verify: " + err.message);
        }
      }

      if (phase === "checking") return html`<div class="loading">Checking device&hellip;</div>`;
      if (phase === "ok") return html`<${App} site=${site} siteCode=${siteCode} siteId=${siteId} />`;
      if (phase === "blocked") return html`
        <div class="gate">
          <div class="gicon">⛔</div>
          <h2>This phone isn't the roll-call device</h2>
          <p>Roll-call is locked to one registered phone. Ask the admin to reset the roll-call device
             (Admin &rarr; Settings &rarr; Roll-call phone) if this phone should take over.</p>
        </div>`;
      if (phase === "nopin") return html`
        <div class="gate">
          <div class="gicon">\u{1F512}</div>
          <h2>Roll-call passcode not set</h2>
          <p>Ask the admin to set the roll-call passcode in Admin &rarr; Settings &rarr; Roll-call phone,
             then reload this page.</p>
        </div>`;
      return html`
        <form class="gate" onSubmit=${submit}>
          <div class="gicon">\u{1F4F1}</div>
          <h2>Roll-call</h2>
          <p>Enter the roll-call passcode.</p>
          <input class="gpin" type="password" inputmode="numeric" autocomplete="off" value=${pin}
                 onInput=${e => setPin(e.target.value)} placeholder="passcode" autofocus />
          ${err && html`<div class="gerr">${err}</div>`}
          <button class="gbtn" type="submit" disabled=${busy}>${busy ? "Checking…" : "Unlock"}</button>
        </form>`;
    }

    const cpMinutes = (code) => { const [h,m]=code.split(":").map(Number); return h*60+m; };
    function nearestCheckpoint(){
      const now=new Date(); const nm=now.getHours()*60+now.getMinutes();
      let pick=CHECKPOINTS[0].code;
      for(const c of CHECKPOINTS){ if(cpMinutes(c.code)<=nm) pick=c.code; }
      return pick;
    }
    function daysBetween(a,b){ return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000); }

    // --- Tool borrowing ON THE PHONE (reuses borrow_issuance + next_no + verify_pin) ----------
    // No warehouse issuance PIN here: the in-charge is already past the roll-call passcode (owner
    // decision 3). The BORROWER still types their own passcode to accept the tool — that is the
    // accountability trail. Slip numbers are server-only (next_no); on failure it REFUSES, never a
    // device-clock fallback (same rule as the Tools page). A unit already out is rejected by the DB
    // (uniq_borrow_unit_out, 23505) and the message names who has it. source="roll-call-phone".
    const ISSUER = "Roll-call phone";
    function Borrow({ site, siteCode, siteId, emps, onClose }){
      const [avail,setAvail]=useState(null);   // [{itemId,name,price,units:[{id,code}]}]
      const [empId,setEmpId]=useState("");
      const [vessel,setVessel]=useState("");
      const [toolId,setToolId]=useState("");
      const [unitId,setUnitId]=useState("");
      const [cart,setCart]=useState([]);        // [{unitId,itemId,code,name}]
      const [phase,setPhase]=useState("build"); // build | pin
      const [pin,setPin]=useState("");
      const [msg,setMsg]=useState("");
      const [busy,setBusy]=useState(false);

      const refresh = ()=> loadAvailTools(siteId).then(setAvail).catch(()=>setAvail([]));
      useEffect(()=>{ refresh(); },[]);

      const tool = (avail||[]).find(t=>t.itemId===toolId);
      const inCart = new Set(cart.map(c=>c.unitId));
      const unitsFor = tool ? tool.units.filter(u=>!inCart.has(u.id)) : [];

      function addUnit(){
        if(!toolId||!unitId){ setMsg("Pili og gamit ug unit."); return; }
        const u=(tool.units||[]).find(x=>x.id===unitId); if(!u) return;
        setCart([...cart, {unitId:u.id, itemId:toolId, code:u.code, name:tool.name}]);
        setUnitId(""); setMsg("");
      }
      function removeUnit(uid){ setCart(cart.filter(c=>c.unitId!==uid)); }

      function toReview(){
        setMsg("");
        if(!empId){ setMsg("Pili kinsa ang mo-hulam."); return; }
        if(!vessel.trim()){ setMsg("Isulat ang barko / project."); return; }
        if(!cart.length){ setMsg("Idugang usa ka gamit."); return; }
        setPhase("pin"); setPin("");
      }

      async function confirm(){
        if(busy) return;
        const code=pin.trim();
        if(!code){ setMsg("Isulat ang passcode sa mo-hulam."); return; }
        setBusy(true); setMsg("");
        try{
          // Borrower's own passcode (verify_pin) — the accountability trail (owner decision 3).
          const { data:ok, error:pe } = await sb.rpc("verify_pin",{ emp_id:empId, pin_input:code });
          if(pe) throw pe;
          if(!ok){ setBusy(false); setMsg("Sayop nga passcode."); return; }

          // Slip number: server-only. Refuse on failure — never a device-clock duplicate.
          let slip="";
          try{ const { data, error } = await sb.rpc("next_no",{ p_prefix:"BS", p_site:siteCode }); if(!error && data) slip=data; }catch(_){ }
          if(!slip){ setBusy(false); setMsg("Wala makakuha og slip number gikan sa server. Sulayi pag-usab."); return; }

          const batch = newToken();
          const rows = cart.map(c=>({ txn_type:"borrow", employee_id:empId, item_id:c.itemId, unit_id:c.unitId,
            site_id:siteId, quantity:1, status:"out", issued_by:ISSUER, project_vessel:vessel.trim(),
            batch_id:batch, slip_no:slip, borrowed_at:new Date().toISOString(), source:"roll-call-phone" }));
          const { error } = await sb.from("borrow_issuance").insert(rows);
          if(error){
            const ec = error.code!=null?String(error.code):"";
            if(ec==="23505" || /duplicate key|already exists/i.test(error.message||"")){
              const outIds=new Set();
              try{ const { data } = await sb.from("borrow_issuance").select("unit_id").eq("status","out").in("unit_id",cart.map(c=>c.unitId)); (data||[]).forEach(r=>outIds.add(r.unit_id)); }catch(_){ }
              const clash=cart.find(c=>outIds.has(c.unitId));
              const holder=clash?await describeUnitHolder(clash.unitId):null;
              setBusy(false); setPhase("build"); refresh();
              setMsg(holder
                ? (clash.name+" ("+clash.code+") gihulam na ni "+holder.name+(holder.slip_no?" (slip "+holder.slip_no+")":"")+". Gi-refresh ang lista.")
                : "Naa nay laing mo-hulam ani nga gamit. Gi-refresh ang lista.");
              return;
            }
            throw error;
          }
          setBusy(false); onClose();
        }catch(e){ setBusy(false); setMsg("Wala ma-save: "+(e.message||e)); }
      }

      const overlay = (inner)=> html`<div class="ov"><div class="ovcard">${inner}</div></div>`;
      if(avail===null) return overlay(html`<div class="loading">Ge-load ang gamit&hellip;</div>`);

      if(phase==="pin"){
        return overlay(html`
          <div class="ovhead"><b>Kumpirmahon ang hulam</b><button class="x" onClick=${()=>setPhase("build")}>‹ Balik</button></div>
          <div class="brsum">${cart.length} ka gamit · ${site}<br/>${cart.map(c=>c.name+" ("+c.code+")").join(", ")}</div>
          <p class="brnote">Ipa-type sa mo-hulam ang iyang kaugalingong passcode aron modawat sa gamit.</p>
          <input class="gpin" type="password" inputmode="numeric" autocomplete="off" value=${pin}
                 onInput=${e=>setPin(e.target.value)} placeholder="passcode sa mo-hulam" autofocus />
          ${msg && html`<div class="msg">${msg}</div>`}
          <button class="borrowbtn" disabled=${busy} onClick=${confirm}>${busy?"Ge-proseso…":"Kumpirmahon ang hulam"}</button>
        `);
      }

      return overlay(html`
        <div class="ovhead"><b>\u{1F9F0} Hulam og gamit — ${site}</b><button class="x" onClick=${onClose}>✕</button></div>
        <label>Kinsa ang mo-hulam</label>
        <select value=${empId} onChange=${e=>setEmpId(e.target.value)}>
          <option value="">— Pili —</option>
          ${(emps||[]).map(e=> html`<option value=${e.id}>${e.name}</option>`)}
        </select>
        <label>Barko / Project</label>
        <input type="text" value=${vessel} onInput=${e=>setVessel(e.target.value)} placeholder="pananglitan MV Maria" />
        <label>Gamit</label>
        <select value=${toolId} onChange=${e=>{ setToolId(e.target.value); setUnitId(""); }}>
          <option value="">— Pili og gamit —</option>
          ${(avail||[]).filter(t=>t.units.some(u=>!inCart.has(u.id))).map(t=> html`<option value=${t.itemId}>${t.name} (${t.units.filter(u=>!inCart.has(u.id)).length})</option>`)}
        </select>
        <div class="add">
          <select value=${unitId} onChange=${e=>setUnitId(e.target.value)}>
            <option value="">— unit —</option>
            ${unitsFor.map(u=> html`<option value=${u.id}>${u.code}</option>`)}
          </select>
          <button class="tog" disabled=${!unitId} onClick=${addUnit}>Idugang</button>
        </div>
        ${cart.length>0 && html`<div class="brcart">
          ${cart.map(c=> html`<div class="brrow"><span>${c.name} · ${c.code}</span><button class="rm" onClick=${()=>removeUnit(c.unitId)}>Tangtangon</button></div>`)}
        </div>`}
        ${msg && html`<div class="msg">${msg}</div>`}
        <button class="borrowbtn" onClick=${toReview}>Hulam (${cart.length})</button>
      `);
    }

    function App({ site, siteCode, siteId }){
      const [date,setDate]=useState(todayLocal());
      const [cp,setCp]=useState(nearestCheckpoint());
      // ?borrow=1 (from the locked field-phone "Hulam" tile) opens the borrow flow straight away.
      const [showBorrow,setShowBorrow]=useState(()=>{ try{ return new URLSearchParams(location.search).get("borrow")==="1"; }catch(_){ return false; } });
      const [emps,setEmps]=useState([]);          // [{id,name}]
      const [jobs,setJobs]=useState(null);         // active jobs for date
      const [roster,setRoster]=useState({});       // job_id -> [emp code]
      const [rows,setRows]=useState([]);           // checkpoint rows for date+cp: {id,job_id,employee_code}
      const [pauses,setPauses]=useState([]);       // active pauses on date: {id,job_id,paused_on,reason}
      const [addPick,setAddPick]=useState({});     // job_id -> selected code
      const [pausing,setPausing]=useState(null);   // job_id currently choosing a reason
      const [msg,setMsg]=useState("");
      const [busy,setBusy]=useState(false);
      const [progress,setProgress]=useState({});   // job_id -> cumulative units to date
      const [pedit,setPedit]=useState({});          // job_id -> in-progress text field value

      useEffect(()=>{ loadEmployees().then(setEmps); },[]);
      useEffect(()=>{ reload(); },[date,cp]);

      async function reload(){
        setMsg("");
        const dnow=date;
        // Fail closed: a yard with no code in `sites` shows NO jobs rather than every yard's.
        // Showing the wrong yard's jobs is how a wrong-yard entry gets made.
        if(!siteCode){ setJobs([]); setRows([]); setPauses([]); return; }
        const jq = sb.from("jobs")
          .select("id,job_no,vessel,location,start_date,target_date,status,est_manhours,quantity,unit,site")
          .not("status","in","(done,closed)").eq("site",siteCode).order("job_no");
        const aq = sb.from("job_assignment").select("job_id,employee_code");
        const cq = sb.from("job_checkpoint").select("id,job_id,employee_code")
          .eq("work_date",dnow).eq("checkpoint",cp);
        const pq = sb.from("job_pause").select("id,job_id,paused_on,resumed_on,reason")
          .lte("paused_on",dnow);
        const [jr,ar,cr,pr]=await Promise.all([jq,aq,cq,pq]);
        if(jr.error){ console.error(jr.error); setMsg("Could not load jobs."); }
        // active = started on/before date (null start = always)
        const active=(jr.data||[]).filter(j=> !j.start_date || j.start_date<=dnow);
        setJobs(active);
        const rm={}; (ar.data||[]).forEach(a=>{ (rm[a.job_id]=rm[a.job_id]||[]).push(a.employee_code); });
        setRoster(rm);
        setRows(cr.data||[]);
        // pause is active on date if not yet resumed (resumed_on null or after date)
        setPauses((pr.data||[]).filter(p=> !p.resumed_on || p.resumed_on>dnow));
        const prog = await loadJobProgressFor(dnow);
        const pm={}; prog.forEach(r=>{ pm[r.job_id]=Number(r.units_cumulative); });
        setProgress(pm);
      }

      const nameOf = (code)=>{ const e=emps.find(x=>x.id===code); return e? e.name : code; };
      const empByCp = {}; rows.forEach(r=>{ empByCp[r.employee_code]=r; });           // emp -> row (this block)
      const presentRow = (job,code)=> rows.find(r=>r.job_id===job && r.employee_code===code);
      const pauseOf = (job)=> pauses.find(p=>p.job_id===job);

      async function toggle(job,code){
        if(busy) return;
        const here=presentRow(job,code);
        const elsewhere=empByCp[code];
        if(here){ // remove
          setBusy(true);
          const {error}=await sb.from("job_checkpoint").delete().eq("id",here.id);
          setBusy(false);
          if(error){ setMsg(error.message); return; }
          reload(); return;
        }
        if(elsewhere){ // tagged on a different job this block
          const otherJob=(jobs||[]).find(j=>j.id===elsewhere.job_id);
          setMsg(`${nameOf(code)} is already on ${otherJob? otherJob.job_no : "another job"} at this checkpoint. Untag there first to move.`);
          return;
        }
        // add present
        setBusy(true);
        const otFlag = (CHECKPOINTS.find(c=>c.code===cp)||{}).ot || false;
        const {error}=await sb.from("job_checkpoint").insert({
          job_id:job, employee_code:code, work_date:date, checkpoint:cp,
          hours:HOURS_PER_CHECKPOINT, is_ot:otFlag, site,   // yard NAME, from ?site=
        });
        setBusy(false);
        if(error){ setMsg(error.message); return; }
        reload();
      }

      async function addMovedIn(job){
        const code=addPick[job];
        if(!code) return;
        setAddPick({...addPick,[job]:""});
        await toggle(job,code);
      }

      async function saveProgress(job){
        const raw = pedit[job]!=null ? pedit[job] : (progress[job]!=null?String(progress[job]):"");
        if(String(raw).trim()===""){ setMsg("Enter a units-done number."); return; }
        const v=Number(raw);
        if(isNaN(v)||v<0){ setMsg("Enter a valid units-done number."); return; }
        setBusy(true);
        const {error}=await upsertJobProgress(job, date, v, null);
        setBusy(false);
        if(error){ setMsg(error.message); return; }
        setProgress({...progress,[job]:v});
        setPedit(prev=>{ const n={...prev}; delete n[job]; return n; });
      }
      async function doPause(job,reason){
        setPausing(null);
        setBusy(true);
        const {error}=await sb.from("job_pause").insert({ job_id:job, paused_on:date, reason, site });
        setBusy(false);
        if(error){ setMsg(error.message); return; }
        reload();
      }
      async function doResume(job){
        const p=pauseOf(job); if(!p) return;
        setBusy(true);
        const {error:e1}=await sb.from("job_pause").update({resumed_on:date}).eq("id",p.id);
        if(e1){ setBusy(false); setMsg(e1.message); return; }
        // auto-extend target_date by the paused days
        const j=(jobs||[]).find(x=>x.id===job);
        const gap=daysBetween(p.paused_on,date);
        if(j && j.target_date && gap>0){
          const nt=ymd(addDays(j.target_date,gap));
          await sb.from("jobs").update({target_date:nt}).eq("id",job);
        }
        setBusy(false);
        reload();
      }

      if(jobs===null) return html`<div class="loading">Loading&hellip;</div>`;
      const cpLabel=(CHECKPOINTS.find(c=>c.code===cp)||{}).label||cp;

      return html`
        ${showBorrow && html`<${Borrow} site=${site} siteCode=${siteCode} siteId=${siteId} emps=${emps} onClose=${()=>setShowBorrow(false)} />`}
        <div class="bar">
          <label>Date</label>
          <input type="date" value=${date} onInput=${e=>setDate(e.target.value)} />
          <div class="cps">
            ${CHECKPOINTS.map(c=> html`
              <div class="cp ${c.code===cp?"on":""}" onClick=${()=>setCp(c.code)}>
                ${c.label}${c.ot && html`<span class="ot">OT</span>`}
              </div>`)}
          </div>
        </div>

        <button id="open-borrow" class="borrowbtn" onClick=${()=>setShowBorrow(true)}>\u{1F9F0} Hulam og gamit</button>

        ${msg && html`<div class="msg">${msg}</div>`}

        ${jobs.length===0
          ? html`<div class="empty">No active job orders on ${date}. Create one in Job Order, or check the start date.</div>`
          : jobs.map(j=>{
              const paused=pauseOf(j.id);
              const rosterCodes=roster[j.id]||[];
              const movedIn=rows.filter(r=>r.job_id===j.id && !rosterCodes.includes(r.employee_code)).map(r=>r.employee_code);
              const shown=[...rosterCodes, ...movedIn];
              const presentCount=rows.filter(r=>r.job_id===j.id).length;
              const candidates=emps.filter(e=> !shown.includes(e.id) && !empByCp[e.id]); // free this block
              return html`
                <div class="job ${paused?"paused":""}">
                  <div class="jhead">
                    <div>
                      <div class="jno">${j.job_no}${j.quantity==null && html`<span class="ntbadge">no target set · not payable</span>`}</div>
                      <div class="jttl">${j.vessel} \u00b7 ${j.location}</div>
                      <div class="jmeta">est ${j.est_manhours} hrs \u00b7 ${j.start_date||"\u2014"} \u2192 ${j.target_date||"\u2014"}</div>
                    </div>
                    ${!paused && html`<div class="count">${presentCount} present \u00b7 +${presentCount*HOURS_PER_CHECKPOINT}h</div>`}
                  </div>

                  ${paused
                    ? html`
                        <div class="holdnote">On hold since ${paused.paused_on}${paused.reason?` \u2014 ${paused.reason}`:""}. Roll-call locked.</div>
                        <button class="resumebtn" disabled=${busy} onClick=${()=>doResume(j.id)}>Resume work</button>`
                    : html`
                        <div class="people">
                          ${shown.length===0
                            ? html`<div class="jmeta">No one assigned. Add someone below.</div>`
                            : shown.map(code=>{
                                const here=!!presentRow(j.id,code);
                                const elsewhere=!here && empByCp[code];
                                const isMoved=movedIn.includes(code);
                                return html`
                                  <div class="prow">
                                    <div class="pname">${nameOf(code)}${isMoved && html`<span class="moved">moved in</span>`}</div>
                                    ${elsewhere
                                      ? html`<div class="tog locked">on ${(jobs.find(x=>x.id===elsewhere.job_id)||{}).job_no||"other"}</div>`
                                      : html`<button class="tog ${here?"present":""}" disabled=${busy} onClick=${()=>toggle(j.id,code)}>
                                          ${here?"Present \u00b7 +2h":"Tap if present"}
                                        </button>`}
                                  </div>`;
                              })}
                        </div>
                        <div class="add">
                          <select value=${addPick[j.id]||""} onChange=${e=>{ setAddPick({...addPick,[j.id]:e.target.value}); }}>
                            <option value="">+ Add someone (moved in)\u2026</option>
                            ${candidates.map(e=> html`<option value=${e.id}>${e.name}</option>`)}
                          </select>
                          <button class="tog" disabled=${busy||!addPick[j.id]} onClick=${()=>addMovedIn(j.id)}>Add</button>
                        </div>
                        <div class="add">
                          <label style="flex:0 0 auto;font-size:12.5px;color:var(--muted);font-weight:600">Units done to date${j.unit?` (${j.unit})`:""}</label>
                          <input type="number" inputmode="decimal" style="flex:1;padding:9px 10px;border:1px dashed #c3d3e4;border-radius:9px;background:#f7fafd;font-size:13.5px"
                                 value=${pedit[j.id]!=null ? pedit[j.id] : (progress[j.id]!=null?String(progress[j.id]):"")} onInput=${e=>setPedit({...pedit,[j.id]:e.target.value})}
                                 placeholder=${j.quantity!=null?`of ${j.quantity}`:"0"} />
                          <button class="tog" disabled=${busy} onClick=${()=>saveProgress(j.id)}>Save</button>
                        </div>
                        ${progress[j.id]!=null && j.quantity!=null && progress[j.id]>j.quantity
                          ? html`<div class="holdnote" style="color:var(--warn)">Units exceed the estimate of ${j.quantity} — job flagged for estimate review; no incentive on overrun units until admin approves.</div>`
                          : ""}
                        ${pausing===j.id
                          ? html`<div class="reasons">
                              ${["Absent","Pulled to priority","No material","Weather","Other"].map(r=>
                                html`<button class="r" onClick=${()=>doPause(j.id,r)}>${r}</button>`)}
                            </div>`
                          : html`<button class="pausebtn" onClick=${()=>setPausing(j.id)}>Pause this job order</button>`}
                      `}
                </div>`;
            })}
      `;
    }

    render(html`<${SiteGate} />`, document.getElementById("app"));
  </script>
</body>
</html>
