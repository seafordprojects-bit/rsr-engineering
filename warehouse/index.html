*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--p:#27500A;--pl:#EAF3DE;--pm:#639922;--pd:#122606;--b:#0C447C;--bl:#E6F1FB;--bm:#378ADD;--am:#EF9F27;--al:#FAEEDA;--ad:#633806;--r:#791F1F;--rl:#FCEBEB;--rm:#F09595;--bg:#fff;--bg2:#F7F7F5;--bg3:#EFEFEC;--bd:#E0DED8;--bd2:#C8C6BE;--tx:#1A1A18;--tx2:#5A5955;--tx3:#9A9890;--rad:10px;--radl:14px;--radx:18px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;background:var(--bg3);color:var(--tx);min-height:100vh}
.app{max-width:720px;margin:0 auto;background:var(--bg);min-height:100vh}
.screen{display:none}.screen.active{display:block}
.lw{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--pl);min-height:100vh}
.lb{background:var(--bg);border-radius:var(--radx);padding:2.5rem 2rem;width:100%;max-width:340px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.lav{width:72px;height:72px;border-radius:50%;background:var(--pl);border:3px solid var(--pm);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:16px}
.pd{width:18px;height:18px;border-radius:50%;background:var(--bd2)}.pd.on{background:var(--p)}
.num-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.nb{padding:18px;font-size:20px;font-weight:500;border:1.5px solid var(--bd);border-radius:var(--radl);background:var(--bg);color:var(--tx);cursor:pointer}
.nb:active{background:var(--pl);border-color:var(--pm)}
.lbtn{width:100%;padding:16px;font-size:17px;font-weight:600;border-radius:var(--radl);border:none;background:var(--p);color:#fff;cursor:pointer}
.tb{padding:13px 16px;background:var(--pl);border-bottom:1.5px solid var(--pm);display:flex;align-items:center;justify-content:space-between}

function fmtDT(s){if(!s)return '';const d=new Date(s);return isNaN(d)?s:d.toLocaleString('en-PH',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});}

async function loadStock(){
  stockMap={};unitMap={};reorderMap={};
  let rows=[];
  try{const{data,error}=await sb.from('warehouse_stock').select('item_name,qty,unit,reorder_qty');if(error)throw error;rows=data||[];}
  catch(e){try{const{data}=await sb.from('warehouse_stock').select('item_name,qty,unit');rows=data||[];}catch(e2){try{const{data}=await sb.from('warehouse_stock').select('item_name,qty');rows=data||[];}catch(e3){}}}
  rows.forEach(r=>{stockMap[r.item_name]=Number(r.qty)||0;if(r.unit)unitMap[r.item_name]=r.unit;if(r.reorder_qty!=null)reorderMap[r.item_name]=Number(r.reorder_qty)||0;});
  const baseNames=ITEMS.map(i=>i.n);
  // Prefer the shared `materials` master (code-based). Fall back to hardcoded ITEMS.
  let mats=[];
  try{ const{data}=await sb.from('materials').select('*'); mats=(data||[]).filter(m=>m.active!==false); }catch(e){}
  if(mats.length){
    catalog=mats.map(m=>({n:m.name,u:m.unit||'pcs',th:Number(m.threshold)||0,code:m.code}));
    // include any stock rows not in the master (orphans), so nothing is hidden
    const known=mats.map(m=>m.name);
    const extra=rows.map(r=>r.item_name).filter(n=>n&&!known.includes(n)).sort((a,b)=>a.localeCompare(b));
    catalog=catalog.concat(extra.map(n=>({n,u:unitMap[n]||'pcs',th:0,code:''})));
  } else {
    const extra=rows.map(r=>r.item_name).filter(n=>n&&!baseNames.includes(n)).sort((a,b)=>a.localeCompare(b));
    catalog=ITEMS.concat(extra.map(n=>({n,u:unitMap[n]||'pcs',th:0})));
  }
}
async function upsertStock(name,qty,unit){
  let r=await sb.from('warehouse_stock').upsert({item_name:name,qty:qty,unit:unit,updated_at:new Date().toISOString()},{onConflict:'item_name'});
  if(r.error){r=await sb.from('warehouse_stock').upsert({item_name:name,qty:qty,updated_at:new Date().toISOString()},{onConflict:'item_name'});}
  return r.error;
}
/* save the per-item reorder qty (blank clears it) */
async function saveReorderQty(name,v){
  const val=(v===''||v==null)?null:(parseInt(v,10)||0);
  reorderMap[name]=val==null?undefined:val;
  try{
    const{error}=await sb.from('warehouse_stock').upsert({item_name:name,reorder_qty:val,updated_at:new Date().toISOString()},{onConflict:'item_name'});
    if(error) throw error;
    toast(val==null?'Reorder qty cleared':'Reorder qty saved');
  }catch(e){ toast('Could not save reorder qty: '+(e&&e.message?e.message:e),'err'); }
}
/* WAREHOUSE → PURCHASING auto-reorder.
   For each item whose new on-hand <= its low threshold (th), write ONE
   requisition into the Purchasing inbox — unless an open requisition for
   that item already exists (dedup). Requested qty = the item's reorder
   qty, or the threshold if none set. Never blocks the dispatch. */
async function autoReorderCheck(names){
  let open={};
  try{
    const{data,error}=await sb.from('requisitions').select('item,status')
      .in('status',['for_purchase','accepted','ordered']);
    if(error) throw error;
    (data||[]).forEach(r=>{open[(r.item||'').toLowerCase()]=true;});
  }catch(e){ toast('Auto-reorder skipped: '+(e&&e.message?e.message:'requisitions table not found'),'err'); return; }
  // daily usage from last 30 days of dispatches (for prediction, same as site issuance)
  const daily={};
  try{
    const since=new Date(Date.now()-30*86400000).toISOString();
    const{data}=await sb.from('dispatches').select('items,created_at').gte('created_at',since).limit(500);
    const use={};(data||[]).forEach(r=>(r.items||[]).forEach(it=>{const nm=it.n||it.name;use[nm]=(use[nm]||0)+(it.qty||0);}));
    Object.keys(use).forEach(k=>daily[k]=use[k]/30);
  }catch(e){}
  const H=14; // forecast horizon (days)
  let made=0;
  for(const name of names){
    const th=gth(name); if(!(th>0)) continue;            // no threshold = never auto-reorder
    if(open[(name||'').toLowerCase()]) continue;          // already an open request → dedup
    const cur=stockMap[name]||0, du=daily[name]||0;
    const lowNow=cur<=th;
    const predLow=du>0 && (cur-du*H)<=th;                 // predicted to fall to/below Min within H days
    if(!(lowNow||predLow)) continue;
    // qty: prefer the item's reorder field; else size to cover Min + forecast usage
    const want=(reorderMap[name]!=null&&reorderMap[name]>0)
      ? reorderMap[name]
      : Math.max(1, Math.max(th*2, Math.ceil(du*H)+th) - cur);
    let ref='';
    try{const{data}=await sb.from('requisitions').select('ref').like('ref','REQ-%').order('ref',{ascending:false}).limit(1);
      let nn=1; if(data&&data[0]){const m=(data[0].ref||'').match(/(\d+)\s*$/); if(m) nn=parseInt(m[1],10)+1;} ref='REQ-'+String(nn).padStart(4,'0');}catch(e){ ref='REQ-'+Date.now().toString().slice(-6); }
    try{
      const{error}=await sb.from('requisitions').insert({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
        ref, date:todayYmd(), item:name, unit:gu(name), qty:want, job:'Stock replenishment',
        requested_by:'Warehouse (reorder)', status:'for_purchase', created_at:new Date().toISOString()});
      if(error) throw error;
      open[(name||'').toLowerCase()]=true; made++; // guard within this same run
    }catch(e){ toast('Reorder failed for '+name+': '+(e&&e.message?e.message:e),'err'); }
  }
  if(made>0) toast('Auto-request sent to Purchasing ('+made+' item'+(made>1?'s':'')+')');
  return made;
}
/* manual sweep: reload stock, then check every catalog item at once */
async function checkAllReorders(btn){
  if(btn){btn.disabled=true;btn.textContent='Checking…';}
  try{
    await loadStock();
    const names=catalog.map(i=>i.n);
    const made=await autoReorderCheck(names);
    if(made===0) toast('Nothing to reorder — all items above their Min, or requests already open');
  }catch(e){ toast('Check failed: '+(e&&e.message?e.message:e),'err'); }
  if(btn){btn.disabled=false;btn.textContent='🛒 Check reorders now → Purchasing';}
}

    +'</div>';
  refreshBadge();

async function swTab(name){
 try{

let currentFlowSub='requests';
function fsubCss(on){return 'flex:1;padding:9px 8px;font-size:12px;font-weight:700;border:none;border-radius:8px;cursor:pointer;font-family:inherit;white-space:nowrap;'+(on?'background:var(--p);color:#fff':'background:transparent;color:var(--tx2)');}

    <button type="button" id="fsub-requests" style="${fsubCss(false)}" onclick="swFlow('requests')">Requests</button>

  </div><div id="flow-content"></div>`;

async function swFlow(sub){
  try{
    currentFlowSub=sub;
    ['requests','dispatch','log'].forEach(t=>{const b=document.getElementById('fsub-'+t);if(b)b.style.cssText=fsubCss(t===sub);});
    const fc=document.getElementById('flow-content');if(!fc)return;fc.scrollTop=0;fc.innerHTML='<div class="empty">Loading…</div>';

async function saveDelivery(){
  await loadPrices();window._prices=prices;
  const sup=document.getElementById('del-sup').value.trim();
  const by=document.getElementById('del-by').value.trim();
  const date=document.getElementById('del-date').value;
  const ref=document.getElementById('del-ref').value.trim();
  if(!sup||!by){toast('Supplier and received-by are required','err');return;}
  const items=[];let empty=false;
  document.querySelectorAll('#del-rows .irow').forEach(r=>{const id=r.id;const n=document.getElementById('dn-'+id).value;const q=parseInt(document.getElementById('dq-'+id).value)||0;const pr=parseFloat(document.getElementById('dpr-'+id).value)||0;if(n&&q>0)items.push({n,u:gu(n),qty:q,price:pr});else if(!n&&q>0)empty=true;});
  if(empty){toast('Select an item for all rows','err');return;}
  if(!items.length){toast('Add at least one item','err');return;}
  await loadStock();
  const n=new Date(),z=x=>String(x).padStart(2,'0');
  const id='PO-'+n.getFullYear()+z(n.getMonth()+1)+z(n.getDate())+'-'+z(n.getHours())+z(n.getMinutes())+z(n.getSeconds());
  const total=items.reduce((s,it)=>s+it.qty*(it.price||0),0);
  try{
    await sb.from('purchases').insert([{id,supplier:sup,invoice:ref||null,date,received_by:by,items,grand_total:total,created_at:new Date().toISOString()}]);
    for(const it of items){const cur=stockMap[it.n]||0;await sb.from('warehouse_stock').upsert({item_name:it.n,qty:cur+it.qty,updated_at:new Date().toISOString()},{onConflict:'item_name'});}
    toast('Delivery recorded · stock updated');
    swTab('stock');
  }catch(e){toast('Failed: '+e.message,'err');}
}
/* receive a Purchasing buy (full or partial) into warehouse stock */
async function receivePurchase(id){
  const qEl=document.getElementById('rcv-q-'+id), byEl=document.getElementById('rcv-by-'+id);
  const recv=parseInt(qEl&&qEl.value,10)||0;
  const by=(byEl&&byEl.value.trim())||'';
  if(recv<=0){toast('Enter the qty received','err');return;}
  if(!by){toast('Enter who received it','err');return;}
  try{
    const{data:rows,error}=await sb.from('purchases').select('*').eq('id',id).limit(1);
    if(error)throw error;
    const p=rows&&rows[0]; if(!p){toast('Purchase not found','err');return;}
    const ord=Number(p.qty)||0, prev=Number(p.qty_received)||0, left=Math.max(0,ord-prev);
    const got=Math.min(recv,left);
    if(got<=0){toast('Already fully received','err');return;}
    // add to warehouse stock
    await loadStock();
    const cur=stockMap[p.item]||0;
    await sb.from('warehouse_stock').upsert({item_name:p.item,qty:cur+got,unit:p.unit||gu(p.item),updated_at:new Date().toISOString()},{onConflict:'item_name'});
    // prices are owned by the Purchasing app; warehouse does not write item_prices
    // update the purchase: accumulate received qty, mark received if complete
    const totalGot=prev+got;
    const newStatus=(totalGot>=ord)?'received':p.status;
    await sb.from('purchases').update({qty_received:totalGot,received_by:by,received_at:todayYmd(),status:newStatus}).eq('id',id);
    toast(got+' × '+p.item+' received'+(totalGot<ord?(' (partial, '+(ord-totalGot)+' still due)'):' · complete'));
    swTab('delivery'); // reload the receive screen
  }catch(e){toast('Receive failed: '+(e&&e.message?e.message:e),'err');}
}

async function renderDispatch(c){

    +'<div style="display:grid;grid-template-columns:minmax(0,2fr) 70px 38px;gap:8px;margin-bottom:6px"><span class="fl" style="margin:0">Item</span><span class="fl" style="margin:0">Qty</span><span></span></div>'

function addDpRow(name,qty,reqQty){
  dpRows++;const id='dp-'+dpRows;
  const div=document.createElement('div');div.className='irow nop';div.id=id;
  div.innerHTML=`<div><select class="fi" id="pn-${id}">${itemOpts(name||'')}</select>${reqQty?`<div style="font-size:11px;color:var(--tx3);margin-top:3px">requested: ${reqQty}</div>`:''}</div>

async function saveDispatch(){
  const site=document.getElementById('dp-site').value;
  const by=document.getElementById('dp-by').value.trim();
  if(!site){toast('Pick a destination site','err');return;}
  if(!by){toast('Enter who is dispatching','err');return;}
  const items=[];let empty=false;
  document.querySelectorAll('#dp-rows .irow').forEach(r=>{const id=r.id;const n=document.getElementById('pn-'+id).value;const q=parseInt(document.getElementById('pq-'+id).value)||0;if(n&&q>0)items.push({n,u:gu(n),qty:q});else if(!n&&q>0)empty=true;});
  if(empty){toast('Select an item for all rows','err');return;}
  if(!items.length){toast('Add at least one item','err');return;}
  await loadStock();
  const dcode=siteCode(site);
  let drNo='';try{const{data,error}=await sb.rpc('next_no',{p_prefix:'DR',p_site:dcode});if(!error&&data)drNo=data;}catch(e){}
  if(!drNo){const n=new Date(),z=x=>String(x).padStart(2,'0');drNo='DR-'+dcode+'-'+z(n.getHours())+z(n.getMinutes())+z(n.getSeconds());}
  const n=new Date(),z=x=>String(x).padStart(2,'0');
  const id='DSP-'+n.getFullYear()+z(n.getMonth()+1)+z(n.getDate())+'-'+z(n.getHours())+z(n.getMinutes())+z(n.getSeconds());
  try{
    await sb.from('dispatches').insert([{id,dr_no:drNo,site,request_id:dpReqId,items,dispatched_by:by,date:todayYmd(),created_at:new Date().toISOString()}]);
    for(const it of items){const cur=stockMap[it.n]||0;const nq=Math.max(0,cur-it.qty);stockMap[it.n]=nq;await sb.from('warehouse_stock').upsert({item_name:it.n,qty:nq,updated_at:new Date().toISOString()},{onConflict:'item_name'});}
    try{ await autoReorderCheck(items.map(it=>it.n)); }catch(e){}
    if(dpReqId){
      let reqItems=[];try{const{data}=await sb.from('requests').select('items').eq('id',dpReqId).single();reqItems=(data&&data.items)||[];}catch(e){}
      const givenMap={};items.forEach(it=>{givenMap[it.n]=(givenMap[it.n]||0)+it.qty;});
      const remaining=reqItems.map(ri=>({n:ri.n,u:ri.u,qty:Math.max(0,(Number(ri.qty)||0)-(givenMap[ri.n]||0))})).filter(ri=>ri.qty>0);
      const done=remaining.length===0;
      const patch=done?{status:'Dispatched',dr_no:drNo,updated_at:new Date().toISOString()}
                       :{status:'Partial',items:remaining,dr_no:drNo,updated_at:new Date().toISOString()};
      let u=await sb.from('requests').update(patch).eq('id',dpReqId);
      if(u.error){const{dr_no,...p2}=patch;await sb.from('requests').update(p2).eq('id',dpReqId);}
    }
    const c=document.getElementById('flow-content')||document.getElementById('main-content');
    c.innerHTML=`<div class="sc" style="text-align:center"><div style="font-size:40px">✅</div><div class="sc-title" style="margin-top:8px">Dispatch created</div>
      <div class="disp-num-box" style="justify-content:center;margin-top:12px"><div class="disp-num">${drNo}</div></div>
      <div class="sc-sub">${items.reduce((s,i)=>s+i.qty,0)} item(s) to ${site}. The site can now receive it.</div>
      <button class="btn btn-primary" onclick="swFlow('log')">View dispatch log</button></div>`;
    toast('Dispatched '+drNo);
  }catch(e){toast('Failed: '+e.message,'err');}
}

/* ── DISPATCH LOG (grouped by request) ── */
async function renderLog(c){
  let rows=[];try{const{data}=await sb.from('dispatches').select('*').order('created_at',{ascending:false}).limit(120);rows=data||[];}catch(e){}
  if(!rows.length){c.innerHTML='<div class="sc"><div class="empty">No dispatches yet.</div></div>';return;}
  const groups=[],idx={};
  rows.forEach(r=>{const key=r.request_id||('__'+r.id);if(idx[key]===undefined){idx[key]=groups.length;groups.push({reqId:r.request_id||null,site:r.site,disps:[]});}groups[idx[key]].disps.push(r);});
  groups.forEach(g=>g.disps.sort((a,b)=>new Date(a.created_at||0)-new Date(b.created_at||0)));
  const slip=r=>{
    const its=(r.items||[]);const tu=its.reduce((s,x)=>s+(Number(x.qty)||0),0);
    const itemRows=its.map(it=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0"><span>${it.n}</span><span style="font-family:monospace;color:var(--tx2);white-space:nowrap">${it.qty}${it.u?' '+it.u:''}</span></div>`).join('');
    const recv=(r.short_items&&r.short_items.length)?'<span class="badge bdanger">SHORT</span>':(r.received?'<span class="badge bok">RECEIVED</span>':'<span class="badge bwarn">IN TRANSIT</span>');
    return `<div style="border:1.5px dashed var(--bd2);border-radius:12px;padding:14px;margin-top:10px">
      <div style="text-align:center;border-bottom:1.5px dashed var(--bd2);padding-bottom:10px;margin-bottom:10px">
        <div style="font-size:14px;font-weight:800;color:var(--p)">Dispatch Receipt</div>
        <div style="font-family:monospace;font-size:13px;color:var(--pm);margin-top:2px">${r.dr_no||r.id}</div>
        <div style="font-size:12px;color:var(--tx2);margin-top:2px">${fmtDT(r.created_at||r.date)} · to ${r.site||'—'}</div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:2px 0"><span style="color:var(--tx2)">Dispatched by</span><span style="font-weight:700">${r.dispatched_by||'—'}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:2px 0"><span style="color:var(--tx2)">Status</span>${recv}</div>
      <div style="border-top:1.5px dashed var(--bd2);margin:8px 0;padding-top:8px;display:flex;justify-content:space-between;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--tx3)"><span>Item</span><span>Qty</span></div>
      ${itemRows}
      <div style="border-top:1.5px dashed var(--bd2);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:13px;font-weight:800;text-transform:uppercase;color:var(--tx2)">Total</span><span style="font-size:18px;font-weight:800;color:var(--p)">${tu} units</span></div>
    </div>`;
  };
  c.innerHTML='<div class="sc"><div class="sc-title">Dispatch log</div><div class="sc-sub">'+groups.length+' request(s) · '+rows.length+' dispatch(es) · tap to open</div>'
    +groups.map(g=>{
      const drNos=g.disps.map(d=>d.dr_no||d.id);
      const totalUnits=g.disps.reduce((s,d)=>s+(d.items||[]).reduce((a,x)=>a+(Number(x.qty)||0),0),0);
      const headTitle=g.reqId||drNos[0];
      const sub=g.reqId?(drNos.length+(drNos.length>1?' dispatches · ':' dispatch · ')+drNos.join(', ')):(g.site||'—');
      return `<div class="dcard">
        <div class="dcard-hdr" onclick="var b=this.parentNode.querySelector('.dcard-body');b.classList.toggle('open');this.querySelector('.chev').textContent=b.classList.contains('open')?'▾':'▸'">
          <div style="display:flex;align-items:center;gap:9px;min-width:0"><span class="chev" style="color:var(--tx3);font-size:13px">▸</span>
          <div style="min-width:0"><div style="font-weight:700;font-family:monospace;color:var(--pd)">${headTitle}</div><div style="font-size:12px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis">${sub}</div></div></div>
          <span class="badge binfo" style="white-space:nowrap">${g.disps.length}× · ${totalUnits}u</span>
        </div>
        <div class="dcard-body">${g.disps.map(slip).join('')}</div>
      </div>`;
    }).join('')
    +'</div>';
}

/* ── INVENTORY (set on-hand) ── */
async function renderInventory(c){
  await loadStock();
  c.innerHTML='<div class="sc"><div class="sc-title">Add a material</div><div class="sc-sub">For old stock not yet on the list. Type the name, unit, and how many are in the warehouse now.</div>'
    +'<div class="fr3"><div class="fg"><label class="fl">Material name</label><input class="fi" id="ni-name" placeholder="e.g. Steel plate 6mm"/></div>'
    +'<div class="fg"><label class="fl">Unit</label><input class="fi" id="ni-unit" placeholder="pcs / m / kg / set" value="pcs"/></div></div>'
    +'<div class="fg"><label class="fl">Quantity on hand</label><input class="fi" type="number" min="0" id="ni-qty" value="0"/></div>'
    +'<div class="btn-row"><button class="btn btn-primary" onclick="saveNewItem()">+ Add to warehouse</button></div></div>'
    +'<div class="sc"><div class="sc-title">Inventory count</div><div class="sc-sub">Set the actual on-hand quantity for each item (opening balance or correction). Prices are managed in the Purchasing app.</div>'
    +catalog.map((i,idx)=>`<div class="irow nop" style="grid-template-columns:minmax(0,1fr) 90px 60px;align-items:center">
      <div><div style="font-weight:600">${i.n}</div><div style="font-size:12px;color:var(--tx3)">${i.u}${i.th>0?' · min '+i.th:''}</div></div>
      <input class="fi" type="number" min="0" id="inv-${idx}" value="${stockMap[i.n]||0}" style="text-align:center"/>
      <button class="btn btn-primary btn-sm" onclick="saveInv(${idx})">Set</button></div>`).join('')
    +'</div>';
}
async function saveInv(idx){
  const it=catalog[idx];if(!it)return;
  const v=parseInt(document.getElementById('inv-'+idx).value,10);
  if(isNaN(v)||v<0){toast('Enter a valid qty','err');return;}
  const err=await upsertStock(it.n,v,it.u);
  if(err){toast('Failed: '+err.message,'err');return;}
  stockMap[it.n]=v;toast(it.n+' set to '+v);
  try{ await autoReorderCheck([it.n]); }catch(e){}
}
async function saveNewItem(){
  const name=document.getElementById('ni-name').value.trim();
  const unit=(document.getElementById('ni-unit').value.trim())||'pcs';
  const qty=parseInt(document.getElementById('ni-qty').value,10)||0;
  if(!name){toast('Enter a material name','err');return;}
  if(catalog.find(i=>i.n.toLowerCase()===name.toLowerCase())){toast('That material is already listed','err');return;}
  const err=await upsertStock(name,qty,unit);
  if(err){toast('Failed: '+err.message,'err');return;}
  toast(name+' added');
  swTab('inventory');
}
</script>
