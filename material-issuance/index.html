<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>RSR Material Issuance</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
:root{--p:#1976D2;--tx:#0f2540;--tx2:#5a6b7e;--tx3:#9aa7b5;--line:#e3e9ef;--bg:#fff;--pl:#f4f7fb;--ok:#12B89E;--r:#e0506a;--rad:14px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--pl);color:var(--tx)}
.app-header{background:var(--bg);border-bottom:1px solid var(--line);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.hdr-site{font-size:15px;font-weight:800}.hdr-sub{font-size:11px;color:var(--tx2);margin-top:1px}
.back{background:none;border:none;color:var(--tx2);font-size:13px;font-weight:700;cursor:pointer;padding:6px}
.wrap{max-width:520px;margin:0 auto;padding:14px}
.card{background:var(--bg);border:1px solid var(--line);border-radius:var(--rad);padding:16px;margin-bottom:14px}
.lbl{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);margin:10px 0 6px}
.lbl:first-child{margin-top:0}
.search{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:16px;background:var(--bg);color:var(--tx);outline:none}
.search:focus{border-color:var(--p)}
.lbtn{width:100%;padding:14px;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:12px}
.combo{position:relative}
.sug{position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--bg);border:1.5px solid var(--line);border-radius:12px;box-shadow:0 8px 24px rgba(15,37,64,.12);z-index:30;max-height:240px;overflow:auto;display:none}
.sug div{padding:11px 14px;font-size:15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--pl)}
.sug div:hover{background:var(--pl)}
.vc{font-family:ui-monospace,monospace;font-size:12px;color:var(--tx3)}
.empty{text-align:center;color:var(--tx3);padding:18px;font-size:14px}
.tool-row{padding:11px 0;border-bottom:1px solid var(--pl)}
.tool-row:last-child{border-bottom:none}
.tool-name{font-size:15px;font-weight:700}.tool-meta{font-size:12px;color:var(--tx2);margin-top:2px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:11px 18px;border-radius:10px;font-size:14px;z-index:99;max-width:90%;text-align:center}
.modal{display:none;position:fixed;inset:0;background:rgba(15,25,40,.5);z-index:80;align-items:center;justify-content:center;padding:16px}
.modal .card{max-width:390px;width:100%;margin:0;max-height:92vh;overflow:auto}
.row2{display:flex;justify-content:space-between;align-items:center;gap:10px}
.kp{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:6px}
</style>
</head>
<body>

<!-- PIN LOGIN -->
<div id="s-login" class="kp">
  <div style="font-size:46px">📦</div>
  <div style="font-size:20px;font-weight:800">RSR Material Issuance</div>
  <div style="font-size:13px;color:var(--tx2);margin-bottom:14px">Enter passcode to continue</div>
  <input id="login-pin" class="search" type="password" inputmode="numeric" placeholder="Passcode" style="max-width:240px;text-align:center;letter-spacing:4px" onkeydown="if(event.key==='Enter')doLogin()"/>
  <button class="lbtn" style="background:var(--p);max-width:240px" onclick="doLogin()">Enter</button>
  <div style="margin-top:14px;font-size:12px;color:var(--tx3)">Site:
    <select id="login-site" class="search" style="display:inline-block;width:auto;padding:6px 10px;font-size:13px"></select>
  </div>
</div>

<!-- ISSUE PAGE -->
<div id="s-issue" style="display:none">
  <div class="app-header">
    <div class="hdr-info"><div class="hdr-site">Material Issuance</div><div class="hdr-sub" id="mi-site-sub">—</div></div>
    <button class="back" onclick="switchSite()">Switch site</button>
  </div>
  <div class="wrap">
    <div class="card">
      <label class="lbl">Date</label>
      <input id="mi-date" class="search" type="date"/>
      <label class="lbl">Project / Vessel</label>
      <div class="combo">
        <input id="mi-vessel" class="search" placeholder="Type or tap to choose vessel" autocomplete="off" oninput="vesselSuggest()" onfocus="vesselSuggest()" onblur="hideVsug()"/>
        <div id="mi-vsug" class="sug"></div>
      </div>
      <label class="lbl">Issued to (crew)</label>
      <div class="combo">
        <input id="mi-emp" class="search" placeholder="Type name or code, or tap to choose" autocomplete="off" oninput="onEmpInput()" onfocus="empSuggest()" onblur="hideEmpSug()"/>
        <div id="mi-emp-sug" class="sug"></div>
      </div>
      <label class="lbl">Issued by</label>
      <input id="mi-by" class="search" placeholder="Storekeeper name"/>
    </div>
    <div class="card">
      <label class="lbl">Add materials</label>
      <select id="mi-item" class="search"></select>
      <input id="mi-qty" class="search" type="number" min="1" value="1" style="margin-top:8px" placeholder="Quantity"/>
      <button class="lbtn" style="background:var(--p)" onclick="addToCart()">+ Add material</button>
    </div>
    <div class="card">
      <label class="lbl">Issuance list</label>
      <div id="mi-cart"><div class="empty">No materials added yet.</div></div>
      <button class="lbtn" style="background:var(--ok)" id="mi-submit" onclick="reviewIssue()">Issue (0)</button>
    </div>
  </div>
</div>

<!-- SLIP CONFIRM -->
<div id="mislip-modal" class="modal">
  <div class="card">
    <div id="mislip-body" style="margin:0 0 12px"></div>
    <div style="font-size:11px;color:var(--tx2);line-height:1.5;background:var(--pl);border-radius:10px;padding:10px 12px;margin-bottom:10px">By signing, the crew member confirms receipt of the materials listed above.</div>
    <label class="lbl">Crew PIN to confirm</label>
    <input id="mislip-pin" class="search" type="password" inputmode="numeric" placeholder="Employee PIN"/>
    <button class="lbtn" style="background:var(--ok)" onclick="confirmIssue()">Confirm &amp; sign</button>
    <button class="lbtn" style="background:#fff;color:var(--tx2);border:1px solid var(--line);margin-top:8px" onclick="document.getElementById('mislip-modal').style.display='none'">Back</button>
  </div>
</div>

<!-- SUCCESS -->
<div id="ok-modal" class="modal">
  <div class="card" style="text-align:center">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--ok);color:#fff;font-size:32px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">✓</div>
    <div style="font-size:18px;font-weight:800">Materials issued</div>
    <div id="ok-no" style="font-family:ui-monospace,monospace;font-size:15px;color:var(--p);margin:6px 0"></div>
    <div id="ok-info" style="font-size:13px;color:var(--tx2)"></div>
    <button class="lbtn" style="background:var(--p)" onclick="newIssue()">New issuance</button>
  </div>
</div>

<script>
const KIOSK_URL='https://wpmcbjrisuyjvobvzaus.supabase.co';
const KIOSK_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndwbWNianJpc3V5anZvYnZ6YXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NjU3ODQsImV4cCI6MjA5MzQ0MTc4NH0.EGyUnXmVkUrsEteKICMRSOXURxYXPOaKUs8EYCpw6_0';
const sb=supabase.createClient(KIOSK_URL,KIOSK_KEY);

const ITEMS=[
  {n:'Electrode handle',u:'pcs'},{n:'Welding gloves',u:'pair'},{n:'Cutting tip',u:'pcs'},
  {n:'Dark glass',u:'pcs'},{n:'Clear glass',u:'pcs'},{n:'Trouble light',u:'pcs'},
  {n:'Electrical tape',u:'pcs'},{n:'Chalk stone',u:'pcs'},{n:'Dry chalk',u:'pcs'},
  {n:'Flint stone',u:'pcs'},{n:'Striker',u:'pcs'},{n:'Y-connector',u:'pcs'},
  {n:'Cutting disk',u:'pcs'},{n:'Oxygen regulator',u:'unit'},{n:'LPG regulator',u:'unit'},{n:'Steel square',u:'pcs'}
];

let sites=[], curSite='', employees=[], vessels=[], cart=[], selEmpId='', issuancePin='1111', pendingIssue=null, reservedNo='';

function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}
function todayYmd2(){const d=new Date(),z=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;}
function fmtNice(ymd){if(!ymd)return '';const d=new Date(ymd+'T00:00:00');return d.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'2-digit'});}
function siteName(){const s=sites.find(x=>x.id===curSite);return s?s.name:'—';}

/* ── boot ── */
(async function boot(){
  try{
    const sres=await sb.from('sites').select('id,name').order('name');
    sites=sres.data||[];
    if(!sites.length){toast('No sites found — check database');}
    curSite=localStorage.getItem('rsr_mi_site')||(sites[0]&&sites[0].id)||'';
    const sel=document.getElementById('login-site');
    sel.innerHTML=sites.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
    if(curSite)sel.value=curSite;
    try{const{data}=await sb.from('settings').select('value').eq('key','issuance_pin').single();if(data&&data.value)issuancePin=String(data.value);}catch(e){}
  }catch(e){toast('Load failed: '+e.message);}
})();

function doLogin(){
  const pin=document.getElementById('login-pin').value.trim();
  curSite=document.getElementById('login-site').value;
  if(!curSite){toast('Pick a site');return;}
  if(pin!==issuancePin){toast('Wrong passcode');return;}
  localStorage.setItem('rsr_mi_site',curSite);
  document.getElementById('login-pin').value='';
  document.getElementById('s-login').style.display='none';
  document.getElementById('s-issue').style.display='block';
  openIssue();
}
function switchSite(){
  document.getElementById('s-issue').style.display='none';
  document.getElementById('s-login').style.display='flex';
}

async function openIssue(){
  document.getElementById('mi-site-sub').textContent=siteName();
  cart=[]; pendingIssue=null; reservedNo=''; selEmpId='';
  const d=document.getElementById('mi-date'); d.min=todayYmd2(); d.value=todayYmd2();
  document.getElementById('mi-vessel').value='';
  document.getElementById('mi-emp').value='';
  document.getElementById('mi-by').value='';
  document.getElementById('mi-qty').value='1';
  document.getElementById('mi-item').innerHTML=ITEMS.map((it,i)=>`<option value="${i}">${it.n} (${it.u})</option>`).join('');
  renderCart();
  const e=await sb.from('employees').select('id,code,name,pin').order('name'); employees=e.data||[];
  await loadVessels();
}

/* ── employee combobox ── */
function onEmpInput(){ selEmpId=''; empSuggest(); }
function empSuggest(){
  const q=(document.getElementById('mi-emp').value||'').toLowerCase().replace(/\s+/g,'');
  const box=document.getElementById('mi-emp-sug');
  let m=employees;
  if(q)m=employees.filter(e=>((e.name||'').toLowerCase().replace(/\s+/g,'')).includes(q)||((e.code||'').toLowerCase().replace(/\s+/g,'')).includes(q));
  m=m.slice(0,12);
  if(!m.length){box.style.display='none';box.innerHTML='';return;}
  box.innerHTML=m.map(e=>`<div onmousedown="pickEmp(this)" data-id="${e.id}" data-name="${(e.name||'').replace(/"/g,'&quot;')}">${e.name}${e.code?`<span class="vc">${e.code}</span>`:''}</div>`).join('');
  box.style.display='block';
}
function pickEmp(el){document.getElementById('mi-emp').value=el.getAttribute('data-name')||'';selEmpId=el.getAttribute('data-id')||'';const b=document.getElementById('mi-emp-sug');b.style.display='none';b.innerHTML='';}
function hideEmpSug(){setTimeout(()=>{const b=document.getElementById('mi-emp-sug');if(b)b.style.display='none';},180);}

/* ── vessel combobox (active only) ── */
async function loadVessels(){
  try{
    const{data}=await sb.from('voyages').select('*').order('vessel_name');
    vessels=(data||[]).filter(v=>{
      if(!v.vessel_name)return false;
      if(v.status==='finished'||v.status==='not_active')return false;
      const dry=(v.docking_date||v.status==='drydock')&&!v.undocking_date;
      const afl=v.afloat_start&&!v.afloat_done;
      const eme=v.emergency_start&&!v.emergency_end;
      return dry||afl||eme;
    });
  }catch(e){vessels=[];}
}
function vesselSuggest(){
  const q=(document.getElementById('mi-vessel').value||'').toLowerCase().replace(/\s+/g,'');
  const box=document.getElementById('mi-vsug');
  let m=vessels;
  if(q)m=vessels.filter(v=>((v.vessel_name||'').toLowerCase().replace(/\s+/g,'')).includes(q)||((v.vessel_code||'').toLowerCase().replace(/\s+/g,'')).includes(q));
  m=m.slice(0,12);
  if(!m.length){box.style.display='none';box.innerHTML=vessels.length?'':'<div style="padding:11px 14px;color:var(--tx3);font-size:14px">No active vessels.</div>';if(!vessels.length)box.style.display='block';return;}
  box.innerHTML=m.map(v=>`<div onmousedown="pickVessel(this)" data-name="${(v.vessel_name||'').replace(/"/g,'&quot;')}" data-code="${(v.vessel_code||'').replace(/"/g,'&quot;')}">${v.vessel_name}${v.vessel_code?`<span class="vc">${v.vessel_code}</span>`:''}</div>`).join('');
  box.style.display='block';
}
let selVesselCode='';
function pickVessel(el){document.getElementById('mi-vessel').value=el.getAttribute('data-name')||'';selVesselCode=el.getAttribute('data-code')||'';const b=document.getElementById('mi-vsug');b.style.display='none';b.innerHTML='';}
function hideVsug(){setTimeout(()=>{const b=document.getElementById('mi-vsug');if(b)b.style.display='none';},180);}

/* ── cart ── */
function addToCart(){
  const idx=document.getElementById('mi-item').value;
  const qty=parseInt(document.getElementById('mi-qty').value,10);
  if(idx===''||isNaN(qty)||qty<1){toast('Pick a material and quantity');return;}
  const it=ITEMS[+idx];
  const ex=cart.find(c=>c.n===it.n);
  if(ex)ex.qty+=qty; else cart.push({n:it.n,u:it.u,qty:qty});
  document.getElementById('mi-qty').value='1';
  renderCart();
}
function removeFromCart(n){cart=cart.filter(c=>c.n!==n);renderCart();}
function renderCart(){
  const el=document.getElementById('mi-cart'), btn=document.getElementById('mi-submit');
  if(!cart.length){el.innerHTML='<div class="empty">No materials added yet.</div>';btn.textContent='Issue (0)';return;}
  el.innerHTML=cart.map(c=>`<div class="tool-row row2"><div><div class="tool-name">${c.n}</div><div class="tool-meta">${c.qty} ${c.u}</div></div><button class="back" style="color:var(--r)" onclick="removeFromCart('${c.n.replace(/'/g,"\\'")}')">Remove</button></div>`).join('');
  btn.textContent='Issue ('+cart.reduce((s,c)=>s+c.qty,0)+')';
}

/* ── review → slip ── */
async function reviewIssue(){
  const date=document.getElementById('mi-date').value;
  const vessel=document.getElementById('mi-vessel').value.trim();
  const emp=document.getElementById('mi-emp').value.trim();
  const by=document.getElementById('mi-by').value.trim();
  if(!date){toast('Pick a date');return;}
  if(date<todayYmd2()){toast('No back-dating allowed');return;}
  if(!vessel){toast('Pick a vessel');return;}
  if(!emp){toast('Choose the crew member');return;}
  if(!by){toast('Enter who is issuing');return;}
  if(!cart.length){toast('Add at least one material');return;}
  // resolve employee id if not picked from list
  if(!selEmpId){
    const match=employees.find(e=>(e.name||'').trim().toLowerCase()===emp.toLowerCase());
    if(match)selEmpId=match.id;
  }
  if(!selEmpId){toast('Select the crew member from the list');return;}
  if(!reservedNo){
    let no='';
    try{const{data,error}=await sb.rpc('next_issuance_no');if(!error&&data)no=data;}catch(e){}
    if(!no){const n=new Date(),z=x=>String(x).padStart(2,'0');no='MI-'+n.getFullYear()+z(n.getMonth()+1)+z(n.getDate())+'-'+z(n.getHours())+z(n.getMinutes())+z(n.getSeconds());}
    reservedNo=no;
  }
  const empObj=employees.find(e=>e.id===selEmpId)||{};
  pendingIssue={date,vessel,vesselCode:selVesselCode,emp,empId:selEmpId,empCode:empObj.code||'',by,items:cart.slice(),no:reservedNo};
  document.getElementById('mislip-body').innerHTML=
    `<div style="text-align:center;border-bottom:1.5px dashed var(--tx3);padding-bottom:12px;margin-bottom:12px">`
    +`<div style="font-size:15px;font-weight:800">RSR — Material Issuance Slip</div>`
    +`<div style="font-family:ui-monospace,monospace;font-size:13px;color:var(--p);margin-top:2px">${reservedNo}</div>`
    +`<div style="font-size:12px;color:var(--tx2);margin-top:2px">${fmtNice(date)} · ${siteName()}</div>`
    +`</div>`
    +`<div style="font-size:13px;line-height:1.9;color:var(--tx2);margin-bottom:12px">`
    +`<div class="row2"><span>Vessel</span><b style="color:var(--tx)">${vessel}</b></div>`
    +`<div class="row2"><span>Issued to</span><b style="color:var(--tx)">${emp}${empObj.code?' · '+empObj.code:''}</b></div>`
    +`<div class="row2"><span>Issued by</span><b style="color:var(--tx)">${by}</b></div>`
    +`</div>`
    +`<div style="border-top:1.5px dashed var(--tx3);padding-top:10px">`
    +`<div class="row2" style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);margin-bottom:10px"><span>Material</span><span>Qty</span></div>`
    +cart.map(c=>`<div class="row2" style="align-items:baseline;margin-bottom:9px"><div style="font-size:15px;font-weight:700">${c.n}</div><div style="font-size:14px;color:var(--tx2);white-space:nowrap">${c.qty} ${c.u}</div></div>`).join('')
    +`<div class="row2" style="align-items:baseline;border-top:1.5px dashed var(--tx3);padding-top:11px;margin-top:2px"><div style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--tx2)">Total</div><div style="font-size:22px;font-weight:900;color:var(--p)">${cart.reduce((s,c)=>s+c.qty,0)}</div></div></div>`;
  document.getElementById('mislip-pin').value='';
  document.getElementById('mislip-modal').style.display='flex';
}

async function confirmIssue(){
  if(!pendingIssue)return;
  const pin=document.getElementById('mislip-pin').value.trim();
  if(!pin){toast('Enter the crew PIN');return;}
  try{
    const{data:ok,error}=await sb.rpc('verify_pin',{emp_id:pendingIssue.empId,pin_input:pin});
    if(error)throw error; if(!ok){toast('Wrong PIN');return;}
  }catch(e){toast('PIN check failed: '+e.message);return;}
  const n=new Date(),z=x=>String(x).padStart(2,'0');
  const row={
    site_key:siteName(), site_id:curSite,
    proj_name:pendingIssue.vessel, proj_code:pendingIssue.vesselCode||null,
    emp_name:pendingIssue.emp, emp_code:pendingIssue.empCode||null,
    date:pendingIssue.date, by_name:pendingIssue.by,
    items:pendingIssue.items, slip_no:pendingIssue.no,
    created_at:new Date(pendingIssue.date+'T'+z(n.getHours())+':'+z(n.getMinutes())+':00').toISOString()
  };
  try{
    const{error}=await sb.from('issuances').insert([row]); if(error)throw error;
    const no=pendingIssue.no, total=pendingIssue.items.reduce((s,c)=>s+c.qty,0);
    document.getElementById('mislip-modal').style.display='none';
    document.getElementById('ok-no').textContent=no;
    document.getElementById('ok-info').textContent=total+' item(s) to '+pendingIssue.vessel;
    document.getElementById('ok-modal').style.display='flex';
    pendingIssue=null; reservedNo='';
  }catch(e){toast('Save failed: '+e.message);}
}
function newIssue(){document.getElementById('ok-modal').style.display='none';openIssue();}
</script>
</body>
</html>
